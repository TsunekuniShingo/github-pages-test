<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { display: block; }
    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-family: sans-serif; font-size: 14px;
    }
  </style>
</head>
<body>
<div id="loading">Loading...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  // --- レンダラー ---
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

  // --- HDR環境マップ（ローカル） ---
  new RGBELoader()
    .load('resources/meadow.hdr', (hdr) => {
      hdr.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = hdr;
      scene.background = hdr;
    });

  // --- ライト ---
  const keyLight = new THREE.DirectionalLight(0xfff4e0, 3);
  keyLight.position.set(3, 5, 3);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.1;
  keyLight.shadow.camera.far = 50;
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0xc9d8ff, 1);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xffffff, 1.5);
  rimLight.position.set(0, 3, -5);
  scene.add(rimLight);

  // --- DRACOLoader（共通） ---
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

  // --- メインモデルのロード ---
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  loader.load(
    'resources/f5c599ae-5a25-42ee-a0f5-f092604bffe7-draco.glb',
    (gltf) => {
      const model = gltf.scene;

      model.traverse((node) => {
        if (node.isMesh) {
          node.castShadow = true;
          node.receiveShadow = true;
        }
      });

      // 接地処理
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      model.position.x = -center.x;
      model.position.z = -center.z;
      model.position.y = -box.min.y; // 底面をy=0に接地

      camera.position.set(0, maxDim * 0.6, maxDim * 2);
      controls.target.set(0, maxDim * 0.3, 0);
      controls.update();

      scene.add(model);
      document.getElementById('loading').remove();
    },
    (xhr) => {
      const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
      document.getElementById('loading').textContent = `Loading... ${pct}%`;
    },
    (error) => console.error('Load error:', error)
  );

  // --- 草モデルを床に敷き詰める ---
  const grassLoader = new GLTFLoader();
  grassLoader.setDRACOLoader(dracoLoader);

  grassLoader.load('resources/model/grass_medium_01_1k.gltf', (gltf) => {
    const grassTemplate = gltf.scene;

    const gridSize = 3;
    const spacing = 0.2;
    const spread = 0.3;

    for (let i = -gridSize; i <= gridSize; i++) {
      for (let j = -gridSize; j <= gridSize; j++) {
        const grass = grassTemplate.clone(true);

        grass.position.set(
          i * spacing + (Math.random() - 0.5) * spread,
          0,
          j * spacing + (Math.random() - 0.5) * spread
        );
        grass.rotation.y = Math.random() * Math.PI * 2;
        const s = 0.8 + Math.random() * 0.4;
        grass.scale.set(s, s, s);

        grass.traverse((node) => {
          if (node.isMesh) node.receiveShadow = true;
        });

        scene.add(grass);
      }
    }
  });

  // --- OrbitControls ---
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 0.2;
  controls.maxDistance = 1;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.5;

  // --- リサイズ対応 ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- アニメーションループ ---
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
