<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { display: block; }
    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-family: sans-serif; font-size: 14px;
    }
  </style>
</head>
<body>
<div id="loading">Loading...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  // --- レンダラー ---
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping; // 映画的な色調補正
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;                 // 影を有効化
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;  // 柔らかい影
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

  // --- HDR環境マップ（物理ベースの照明） ---
  new RGBELoader()
    .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr', (hdr) => {
      hdr.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = hdr;       // PBRマテリアルの反射に使用
      scene.background = hdr;        // 背景にも適用（不要なら削除）
    });

  // --- 追加ライト ---
  // キーライト（主光源）
  const keyLight = new THREE.DirectionalLight(0xfff4e0, 3);
  keyLight.position.set(3, 5, 3);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.1;
  keyLight.shadow.camera.far = 50;
  scene.add(keyLight);

  // フィルライト（影を和らげる補助光）
  const fillLight = new THREE.DirectionalLight(0xc9d8ff, 1);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  // リムライト（輪郭を際立たせる逆光）
  const rimLight = new THREE.DirectionalLight(0xffffff, 1.5);
  rimLight.position.set(0, 3, -5);
  scene.add(rimLight);

  // --- 床（影を受ける） ---
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // --- OrbitControls ---
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 0.05;
  controls.maxDistance = 2;
  controls.autoRotate = true;       // 自動回転
  controls.autoRotateSpeed = 1.5;

  // --- GLBロード ---
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  loader.load(
    'resources/f5c599ae-5a25-42ee-a0f5-f092604bffe7-draco.glb',
    (gltf) => {
      const model = gltf.scene;

      // 影を有効化
      model.traverse((node) => {
        if (node.isMesh) {
          node.castShadow = true;
          node.receiveShadow = true;
        }
      });

      // 中央・カメラ自動調整
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      model.position.sub(center);
      model.position.y += size.y / 2; // 床の上に配置

      camera.position.set(0, maxDim * 0.6, maxDim * 2);
      controls.target.set(0, 0, 0);

      scene.add(model);
      document.getElementById('loading').remove();
    },
    (xhr) => {
      const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
      document.getElementById('loading').textContent = `Loading... ${pct}%`;
    },
    (error) => console.error('Load error:', error)
  );

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
